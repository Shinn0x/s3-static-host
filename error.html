<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Not Found — Shinn</title>
<meta name="robots" content="noindex">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%232563eb'/><stop offset='1' stop-color='%2306b6d4'/></linearGradient></defs><rect width='100' height='100' rx='24' fill='url(%23g)'/><text x='50' y='55' font-size='62' font-family='Segoe UI,Arial,sans-serif' font-weight='800' fill='white' text-anchor='middle' dominant-baseline='central'>S</text></svg>">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0b1120; --surface: rgba(255,255,255,0.04); --border: rgba(255,255,255,0.12);
    --text: #e8eefc; --soft: #aab6d0; --mute: #828fb2;
    --brand: #2563eb; --brand2: #06b6d4; --accent: #10b981;
    --font: 'Segoe UI', system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif;
    --mono: ui-monospace, 'SF Mono', 'JetBrains Mono', 'Courier New', monospace;
  }
  [data-theme="light"] {
    --bg: #f6f8fc; --surface: rgba(15,23,42,0.03); --border: rgba(15,23,42,0.12);
    --text: #0f172a; --soft: #475569; --mute: #64748b;
  }

  body {
    min-height: 100vh; font-family: var(--font); color: var(--text); background: var(--bg);
    line-height: 1.6; display: grid; place-items: center; padding: 28px 18px; text-align: center;
    overflow: hidden;
  }
  body::before {
    content: ''; position: fixed; inset: 0; z-index: -1; opacity: 0.9;
    background:
      radial-gradient(40rem 30rem at 12% -8%, color-mix(in srgb, var(--brand) 32%, transparent), transparent 60%),
      radial-gradient(36rem 28rem at 90% 0%, color-mix(in srgb, var(--brand2) 26%, transparent), transparent 58%),
      radial-gradient(40rem 34rem at 50% 116%, color-mix(in srgb, var(--accent) 18%, transparent), transparent 60%);
    background-size: 200% 200%; animation: drift 18s ease-in-out infinite;
  }
  @keyframes drift { 0%,100% { background-position: 0% 0%; } 50% { background-position: 100% 100%; } }

  .inner { max-width: 460px; animation: rise 0.7s cubic-bezier(.16,1,.3,1) both; }
  @keyframes rise { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: none; } }

  .eyebrow {
    display: inline-flex; align-items: center; gap: 8px; font-family: var(--mono);
    font-size: 0.72rem; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--brand2); padding: 6px 14px; border-radius: 999px;
    background: color-mix(in srgb, var(--brand2) 12%, transparent);
    border: 1px solid color-mix(in srgb, var(--brand2) 30%, transparent);
  }
  .eyebrow .dot { width: 7px; height: 7px; border-radius: 50%; background: #f59e0b; box-shadow: 0 0 8px #f59e0b; }

  .code {
    font-weight: 800; letter-spacing: -0.04em; line-height: 0.92;
    font-size: clamp(6rem, 26vw, 13rem); margin: 0.3rem 0;
    background: linear-gradient(135deg, var(--brand), var(--brand2));
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent; color: transparent; user-select: none;
  }
  .code .flick { display: inline-block;
    background: linear-gradient(135deg, var(--brand), var(--brand2));
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    animation: flick 5s 2s ease-in-out infinite;
  }
  @keyframes flick { 0%,88%,100% { opacity: 1; } 89% { opacity: 0.5; } 91% { opacity: 1; } 93% { opacity: 0.7; } }

  h1 { font-size: clamp(1.2rem, 4vw, 1.6rem); font-weight: 700; }
  p { color: var(--soft); margin-top: 0.6rem; font-size: 0.95rem; }

  .term {
    margin: 1.4rem auto 0; max-width: 380px; text-align: left;
    background: var(--surface); border: 1px solid var(--border); border-radius: 11px;
    font-family: var(--mono); font-size: 0.78rem; line-height: 1.8; color: var(--soft);
    padding: 13px 15px; backdrop-filter: blur(10px);
  }
  .term .pr { color: var(--brand2); } .term .err { color: #f87171; font-weight: 600; } .term .ok { color: var(--accent); }

  .btn {
    display: inline-flex; align-items: center; gap: 8px; margin-top: 1.6rem; text-decoration: none;
    color: #fff; font-weight: 600; font-size: 0.9rem; padding: 12px 22px; border-radius: 11px;
    background: linear-gradient(135deg, var(--brand), var(--brand2)); transition: 0.2s;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 14px 30px -12px var(--brand); }
</style>
</head>
<body>
  <div class="inner">
    <span class="eyebrow"><span class="dot"></span>Error · Not Found</span>
    <div class="code">4<span class="flick">0</span>4</div>
    <h1>This page took a wrong turn.</h1>
    <p>The file you asked for isn't in this bucket — it moved, was renamed, or never got uploaded.</p>

    <div class="term">
      <span class="pr">$</span> aws s3 ls &lt;requested-key&gt;<br>
      &gt; <span class="err">404 — key not found</span><br>
      <span class="pr">$</span> open / <span class="ok"># back to safety</span>
    </div>

    <a class="btn" href="/">Back to home →</a>
  </div>
</body>
</html>
